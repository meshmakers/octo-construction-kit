$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
records:
- recordId: Address
  attributes:
    - id: ${thisModel}/AddressDepartment
      name: Department
      isOptional: true
    - id: ${thisModel}/AddressStreet
      name: Street
    - id: ${thisModel}/AddressZipcode
      name: Zipcode
    - id: ${thisModel}/AddressPOBox
      name: POBox
      isOptional: true
    - id: ${thisModel}/AddressZipOfPOBox
      name: ZipOfPOBox
      isOptional: true
    - id: ${thisModel}/AddressCityTown
      name: CityTown
    - id: ${thisModel}/AddressStateCounty
      name: StateCounty
      isOptional: true
    - id: ${thisModel}/AddressNationalCode
      name: NationalCode
    - id: ${thisModel}/AddressVATnumber
      name: VATnumber
      isOptional: true
    - id: ${thisModel}/AddressRemarks
      name: AddressRemarks
      isOptional: true
    - id: ${thisModel}/AddressOfAdditionalLink
      name: AddressOfAdditionalLink
      isOptional: true
    - id: ${thisModel}/AddressPhone
      name: Phone
      isOptional: true
    - id: ${thisModel}/AddressFax
      name: Fax
      isOptional: true
    - id: ${thisModel}/AddressEMail
      name: EMail
      isOptional: true
