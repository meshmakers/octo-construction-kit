$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: WaterMeter
  derivedFromCkTypeId: IndustryBasic/Machine
  attributes:
  - id: ${thisModel}/NetVolume
    name: NetVolume
  - id: ${thisModel}/Volume
    name: Volume
    isOptional: true
  - id: ${thisModel}/ReverseVolume
    name: ReverseVolume
    isOptional: true
  - id: Basic/AvgTemperature
    name: AvgWaterTemperature
    isOptional: true
  - id: Basic/MinTemperature
    name: MinWaterTemperature
    isOptional: true
  - id: Basic/MaxTemperature
    name: MaxWaterTemperature
    isOptional: true
