parameters:
  - name: DocumentationContext
    type: object

steps:
  - ${{ each parameter in DocumentationContext }}:
    - task: DotNetCoreCLI@2
      displayName: 'Generate Documentation'
      inputs:
        command: 'build'
        projects: ${{ parameters.DocumentationContext }}
        arguments: '--configuration Release /p:OctoGenerateCkDocumentation=true'

  - task: CopyFiles@2
    displayName: 'Copy Files from $(Build.SourcesDirectory)/**/octo-ck-libraries/**/out/**/*.md to $(build.artifactstagingdirectory)'
    inputs:
      SourceFolder: $(Build.SourcesDirectory)
      Contents: |
        /**/octo-ck-libraries/**/out/**/*.md
      TargetFolder: $(build.artifactstagingdirectory)