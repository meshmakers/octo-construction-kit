$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Customer
  derivedFromCkTypeId: Basic/Asset
  attributes:
  - id: ${thisModel}/FirstName
    name: FirstName
  - id: ${thisModel}/LastName
    name: LastName
  - id: ${thisModel}/CompanyName
    name: CompanyName
    isOptional: true
  - id: ${thisModel}/Street
    name: Street
  - id: ${thisModel}/PostalCode
    name: PostalCode
  - id: ${thisModel}/City
    name: City    
  - id: ${thisModel}/Country
    name: Country
  - id: ${thisModel}/EMailAddress
    name: EMailAddress
    isOptional: true
  - id: ${thisModel}/DateOfBirth
    name: DateOfBirth
    isOptional: true
  - id: ${thisModel}/PhoneNumberMobile
    name: PhoneNumberMobile
    isOptional: true
  - id: ${thisModel}/PhoneNumberLandLine
    name: PhoneNumberLandLine
    isOptional: true