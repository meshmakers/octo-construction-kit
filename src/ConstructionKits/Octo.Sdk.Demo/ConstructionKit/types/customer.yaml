$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Customer
  derivedFromCkTypeId: ${System}/Entity
  indexes:
  - indexType: "Ascending"
    fields:
      - attributePaths:
        - Contact.FirstName
        - Contact.LastName
        - Contact.CompanyName
        - Contact.Address.Street
        - Contact.Address.CityTown
        - Contact.Email
  - indexType: "Text"
    language: "en"
    fields:
      - weight: 1
        attributePaths:
          - Contact.FirstName
          - Contact.Address.Street
          - Contact.Address.CityTown
          - Contact.Email
  - indexType: "Text"
    language: "en"
    fields:
      - weight: 2
        attributePaths:
          - Contact.FirstName
          - Contact.LastName
          - Contact.CompanyName
          - Contact.Email
  attributes:
  - id: ${Basic}/Contact
    name: Contact
  - id: ${Basic}/BankAccount
    name: BankAccount
    isOptional: true
  - id: ${this}/DateOfBirth
    name: DateOfBirth
    isOptional: true
  - id: ${this}/PhoneNumberMobile
    name: PhoneNumberMobile
    isOptional: true
  - id: ${this}/PhoneNumberLandLine
    name: PhoneNumberLandLine
    isOptional: true
  - id: ${this}/CustomerStatus
    name: CustomerStatus
