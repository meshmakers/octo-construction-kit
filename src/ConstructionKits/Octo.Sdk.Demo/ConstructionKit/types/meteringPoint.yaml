$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: MeteringPoint
  derivedFromCkTypeId: Basic/Asset
  indexes:
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - MeteringPointNumber
  attributes:
  - id: ${thisModel}/MeteringPointNumber
    name: MeteringPointNumber
  - id: ${thisModel}/MeterReading
    name: MeterReading
  - id: ${thisModel}/OperatingStatus
    name: OperatingStatus
  - id: ${thisModel}/NetworkOperator
    name: NetworkOperator
    isOptional: true