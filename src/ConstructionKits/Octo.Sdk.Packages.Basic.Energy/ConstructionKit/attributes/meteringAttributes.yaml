$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
  - id: MeteringPointNumber
    valueType: String
    description: "Number identifying the metering point"
  - id: IsProducer
    valueType: Boolean
    description: "Indicates if the new metering point is a producer"
  - id: ConsentId
    valueType: String
    description: "Identifier for the consent associated with the metering point"
  - id: CarrierType
    valueType: Enum
    valueCkEnumId: ${this}/CarrierType
    description: "Type of energy carrier (e.g., electricity, gas)"

