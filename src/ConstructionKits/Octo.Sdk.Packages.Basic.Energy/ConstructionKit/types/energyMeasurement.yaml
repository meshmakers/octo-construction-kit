$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: EnergyMeasurement
  derivedFromCkTypeId: ${System}/Entity
  isAbstract: false
  description: "Describes a measurement of energy, such as consumption or production."
  attributes:
    - id: ${Basic}/TimeRange
      name: TimeRange
    - id: ${Basic}/Amount
      name: Amount
    - id: ${this}/ObisCode
      name: ObisCode
      isOptional: true
    - id: ${this}/DataQuality
      name: DataQuality
      isOptional: true
  associations:
    - id: ${System}/ParentChild
      targetCkTypeId: ${this}/MeteringPoint
  indexes:
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - TimeRange.From
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - TimeRange.From
            - TimeRange.To
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - TimeRange.From
            - ObisCode
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - TimeRange.From
            - TimeRange.To
            - ObisCode
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - TimeRange.From
            - TimeRange.To
            - ObisCode
            - DataQuality
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - TimeRange.From
            - TimeRange.To
            - DataQuality