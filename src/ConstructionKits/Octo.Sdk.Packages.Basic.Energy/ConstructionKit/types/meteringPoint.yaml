$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: MeteringPoint
  derivedFromCkTypeId: ${Basic}/NamedEntity
  isAbstract: true
  description: "Metering Point"
  attributes:
    - id: ${this}/MeteringPointNumber
      name: MeteringPointNumber
    - id: ${this}/State
      name: State
    - id: ${this}/ConsentId
      name: ConsentId
      isOptional: true
    - id: ${this}/CarrierType
      name: CarrierType
  associations:
    - id: ${System}/ParentChild
      targetCkTypeId: ${this}/OperatingFacility
  indexes:
    - indexType: UniqueNotDeleted
      fields:
        - attributePaths:
            - MeteringPointNumber
