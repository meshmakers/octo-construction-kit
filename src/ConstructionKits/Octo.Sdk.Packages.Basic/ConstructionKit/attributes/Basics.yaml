$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
  - id: Temperature
    valueType: Double
    metaData:
      - key: Unit
        value: "°C"
      - key: Type
        value: Current
  - id: MinTemperature
    valueType: Double
    metaData:
      - key: Unit
        value: "°C"
      - key: Type
        value: Minimum
  - id: MaxTemperature
    valueType: Double
    metaData:
      - key: Unit
        value: "°C"
      - key: Type
        value: Maximum
  - id: AvgTemperature
    valueType: Double
    metaData:
      - key: Unit
        value: "°C"
      - key: Type
        value: Average
  - id: File
    valueType: BinaryLinked
  - id: Time
    valueType: DateTime
  - id: Comment
    valueType: String
    description: "Optional Comment on the user"