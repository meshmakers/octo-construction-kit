$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
  - id: From
    valueType: DateTime
    description: "From date within a time range"
  - id: To
    valueType: DateTime
    description: "To date within a time range"
  - id: TimeRange
    valueType: Record
    description: "A time range with a start and end date"
    valueCkRecordId: ${this}/TimeRange