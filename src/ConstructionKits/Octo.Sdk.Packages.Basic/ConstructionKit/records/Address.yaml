$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
records:
- recordId: Address
  attributes:
    - id: ${this}/AddressDepartment
      name: Department
      isOptional: true
    - id: ${this}/AddressStreet
      name: Street
    - id: ${this}/AddressZipcode
      name: Zipcode
    - id: ${this}/AddressPOBox
      name: POBox
      isOptional: true
    - id: ${this}/AddressZipOfPOBox
      name: ZipOfPOBox
      isOptional: true
    - id: ${this}/AddressCityTown
      name: CityTown
    - id: ${this}/AddressStateCounty
      name: StateCounty
      isOptional: true
    - id: ${this}/AddressNationalCode
      name: NationalCode
    - id: ${this}/AddressVATnumber
      name: VATnumber
      isOptional: true
    - id: ${this}/AddressRemarks
      name: AddressRemarks
      isOptional: true
    - id: ${this}/AddressOfAdditionalLink
      name: AddressOfAdditionalLink
      isOptional: true
    - id: ${this}/AddressPhone
      name: Phone
      isOptional: true
    - id: ${this}/AddressFax
      name: Fax
      isOptional: true
    - id: ${this}/AddressEMail
      name: EMail
      isOptional: true
