$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
records:
- recordId: BankAccount
  description: "A bank account with its details"
  attributes:
    - id: ${this}/Iban
      name: Iban
    - id: ${this}/SwiftCode
      name: SwiftCode
      isOptional: true
    - id: ${this}/BankName
      name: BankName
      isOptional: true
    - id: ${this}/AccountHolder
      name: AccountHolder
