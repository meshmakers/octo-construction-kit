$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
records:
- recordId: Contact
  attributes:
    - id: ${this}/LegalEntityType
      name: LegalEntityType
    - id: ${this}/Salutation
      name: Salutation
      isOptional: true
    - id: ${this}/FirstName
      name: FirstName
      isOptional: true
    - id: ${this}/LastName
      name: LastName
      isOptional: true
    - id: ${this}/AcademicTitlePrefix
      name: TitlePrefix
      isOptional: true
    - id: ${this}/AcademicTitleSuffix
      name: TitleSuffix
      isOptional: true
    - id: ${this}/CompanyName
      name: CompanyName
      isOptional: true
    - id: ${this}/Address
      name: Address
    - id: ${this}/TaxIdentificationNumber
      name: TaxIdentificationNumber
      isOptional: true
    - id: ${this}/CompanyRegisterNumber
      name: CompanyRegisterNumber
      isOptional: true
    - id: ${this}/EMailAddress
      name: Email
      isOptional: true
