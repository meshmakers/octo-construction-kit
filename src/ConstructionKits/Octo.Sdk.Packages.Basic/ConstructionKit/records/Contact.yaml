      name: LegalEntityType
    - id: ${thisModel}/Salutation
      name: Salutation
      isOptional: true
    - id: ${thisModel}/FirstName
      name: FirstName
      isOptional: true
    - id: ${thisModel}/LastName
      name: LastName
      isOptional: true
    - id: ${thisModel}/AcademicTitlePrefix
