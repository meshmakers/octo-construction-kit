$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
records:
- recordId: EMail
  attributes:
    - id: ${this}/EMailAddress
      name: EMail
    - id: ${this}/EMailPublicKey
      name: PublicKey
      isOptional: true
    - id: ${this}/EMailTypeOfEmailAddress
      name: TypeOfEMail
      isOptional: true
    - id: ${this}/EMailTypeOfPublicKey
      name: TypeOfPublicKey
      isOptional: true