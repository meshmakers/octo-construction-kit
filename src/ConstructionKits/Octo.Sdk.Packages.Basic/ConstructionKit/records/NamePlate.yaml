$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
records:
- recordId: NamePlate
  attributes:
    - id: ${thisModel}/NamePlate.ManufacturerName
      name: ManufacturerName
    - id: ${thisModel}/NamePlate.ManufacturerProductDesignation
      name: ManufacturerProductDesignation
    - id: ${thisModel}/NamePlate.Address
      name: Address
      isOptional: true
    - id: ${thisModel}/NamePlate.ManufacturerProductFamily
      name: ManufacturerProductFamily
    - id: ${thisModel}/NamePlate.SerialNumber
      name: SerialNumber
      isOptional: true
    - id: ${thisModel}/NamePlate.YearOfConstruction
      name: YearOfConstruction
    - id: ${thisModel}/NamePlate.Markings
      name: Markings
      isOptional: true
    - id: ${thisModel}/NamePlate.AssetSpecificProperties
      name: AssetSpecificProperties
      isOptional: true