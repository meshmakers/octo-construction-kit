$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Document
  derivedFromCkTypeId: ${System}/Entity
  isAbstract: true
  description: "A document that can be used in the system."
  attributes:
  - id: ${this}/DocumentNumber
    name: DocumentNumber
    autoIncrementReference: "BillingDocumentDocumentNumber"
  - id: ${this}/DocumentDate
    name: DocumentDate
