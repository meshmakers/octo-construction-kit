$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Customer
  derivedFromCkTypeId: System/Entity
  description: "Customer Information"
  attributes:
  - id: ${thisModel}/FirstName
    name: FirstName
  - id: ${thisModel}/LastName
    name: LastName
  - id: ${thisModel}/CompanyName
    name: CompanyName
  - id: ${thisModel}/Address
    name: Address
  - id: System.Identity/User
    isOptional: true
    name: UserCredentials
  associations:
    - id: ${thisModel}/AssociatedFacilities
      targetCkTypeId: ${thisModel}/OperatingFacility
