$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
associationRoles:
  - id: AssociatedEnergyQuantity
    description: "The energy quantity associated with the billing document line item."
    inboundName: EnergyQuantity
    inboundMultiplicity: One
    outboundName: BillingDocumentLineItems
    outboundMultiplicity: ZeroOrOne
  - id: AssociatedCustomer
    description: "The customer associated with the operating facilities."
    inboundName: Facilities
    inboundMultiplicity: N
    outboundName: Customer
    outboundMultiplicity: One