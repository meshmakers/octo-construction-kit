$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
associationRoles:
  - id: AssignedBilling
    description: "A billing document or line item associated with data source."
    inboundName: Billings
    inboundMultiplicity: N
    outboundName: AssignedTo
    outboundMultiplicity: ZeroOrOne
  - id: BilledMeteringPoint
    description: "A metering point associated with a billing line item."
    inboundName: Billings
    inboundMultiplicity: N
    outboundName: AssignedTo
    outboundMultiplicity: ZeroOrOne
  - id: AssociatedCustomer
    description: "The customer associated with the operating facilities."
    inboundName: Facilities
    inboundMultiplicity: N
    outboundName: Customer
    outboundMultiplicity: One
  - id: MessageToProcess
    description: "Association between a message and the process it is part of."
    inboundName: Messages
    inboundMultiplicity: N
    outboundName: Process
    outboundMultiplicity: ZeroOrOne
