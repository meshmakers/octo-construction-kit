$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
- id: Salutation
  valueType: Enum
  valueCkEnumId: ${thisModel}/Salutation
  description: "Salutation associated with the customer"
- id: FirstName
  valueType: String
  description: "The users first name(s)"
- id: LastName
  valueType: String
  description: "The users last name(s)"
- id: Title
  valueType: Enum
  valueCkEnumId: ${thisModel}/Title
  description: "Title associated with the customer"
- id: CompanyName
  valueType: String
  description: "The company's name"

- id: CustomerNumber
  valueType: String
  description: "Internal customer number"


- id: BillingCycle
  valueType: Enum
  valueCkEnumId: ${thisModel}/BillingCycle
  description: "Billing cycle associated with the customer"
  defaultValues:
    - 1
