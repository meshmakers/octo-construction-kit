$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: BillingDocument
    derivedFromCkTypeId: ${Basic}/Document
    description: "A billing document entity that contains accounting information."
    attributes:
      - id: ${this}/CustomerNumber
        name: CustomerNumber
      - id: ${Basic}/Contact
        name: Contact
      - id: ${Basic}/TimeRange
        name: TimeRange
      - id: ${Basic}/Comment
        name: Comment
        isOptional: true
      - id: ${this}/TaxProcedureCreditNote
        name: TaxProcedureCreditNote
      - id: ${this}/BillingType
        name: BillingType
      - id: ${this}/BillingDocumentState
        name: BillingDocumentState
      - id: ${this}/GrossTotal
        name: GrossTotal
      - id: ${Basic}/BankAccount
        name: BankAccount
        isOptional: true
    associations:
      - id: ${this}/AssignedBilling
        targetCkTypeId: ${this}/Customer
