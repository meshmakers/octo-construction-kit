$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: BillingDocument
    derivedFromCkTypeId: Basic/Document
    description: "A billing document entity that contains accounting information."
    attributes:
      - id: ${thisModel}/CustomerNumber
        name: CustomerNumber
      - id: Basic/Contact
        name: Contact
      - id: Basic/TimeRange
        name: TimeRange
      - id: Basic/Comment
        name: Comment
        isOptional: true
      - id: ${thisModel}/BillingType
        name: BillingType
      - id: ${thisModel}/BillingDocumentState
        name: BillingDocumentState
      - id: ${thisModel}/GrossTotal
        name: GrossTotal
      - id: Basic/BankAccount
        name: BankAccount
        isOptional: true
    associations:
      - id: ${thisModel}/AssignedBilling
        targetCkTypeId: ${thisModel}/Customer
