$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: BillingDocumentLineItem
    derivedFromCkTypeId: ${System}/Entity
    description: "An billing document line item"
    attributes:
      - id: ${this}/GrossAmount
        name: GrossAmount
      - id: ${this}/NetAmount
        name: NetAmount
      - id: ${this}/TaxAmount
        name: TaxAmount
      - id: ${this}/TaxRate
        name: TaxRate
      - id: ${this}/UnitPrice
        name: UnitPrice
      - id: ${this}/BillingType
        name: BillingType
      - id: ${Basic}/Quantity
        name: Quantity
    associations:
      - id: ${System}/ParentChild
        targetCkTypeId: ${this}/BillingDocument
      - id: ${this}/AssignedBilling
        targetCkTypeId: ${this}/EnergyQuantity
      - id: ${this}/BilledMeteringPoint
        targetCkTypeId: ${this}/MeteringPoint