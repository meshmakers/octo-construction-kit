$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Customer
  derivedFromCkTypeId: System/Entity
  description: "Represents a customer of an energy community"
  attributes:
  - id: ${thisModel}/CustomerNumber
    name: CustomerNumber
  - id: Basic/Contact
    name: Contact
  - id: Basic/Comment
    name: Comment
    isOptional: true
  - id: ${thisModel}/BillingCycle
    name: BillingCycle
  - id: ${thisModel}/State
    name: State
  - id: Basic/BankAccount
    name: BankAccount
    isOptional: true
  - id: ${thisModel}/TaxProcedureCreditNote
    name: TaxProcedureCreditNote