$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Customer
  derivedFromCkTypeId: ${System}/Entity
  description: "Represents a customer of an energy community"
  attributes:
  - id: ${this}/CustomerNumber
    name: CustomerNumber
    autoIncrementReference: "CustomerNumber"
  - id: ${Basic}/Contact
    name: Contact
  - id: ${Basic}/Comment
    name: Comment
    isOptional: true
  - id: ${this}/BillingCycle
    name: BillingCycle
  - id: ${this}/State
    name: State
  - id: ${Basic}/BankAccount
    name: BankAccount
    isOptional: true
  - id: ${this}/TaxProcedureCreditNote
    name: TaxProcedureCreditNote