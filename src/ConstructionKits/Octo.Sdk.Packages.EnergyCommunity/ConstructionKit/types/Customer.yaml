$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Customer
  derivedFromCkTypeId: System/Entity
  description: "Represents a customer of an energy community"
  attributes:
  - id: ${thisModel}/Salutation
    name: Salutation
    isOptional: true
  - id: ${thisModel}/FirstName
    name: FirstName
    isOptional: true
  - id: ${thisModel}/LastName
    name: LastName
    isOptional: true
  - id: ${thisModel}/Title
    name: Title
    isOptional: true
  - id: ${thisModel}/CompanyName
    name: CompanyName
    isOptional: true
  - id: Basic/Address
    name: Address
  - id: ${thisModel}/CustomerNumber
    name: CustomerNumber
  - id: Basic/TaxIdentificationNumber
    name: TaxIdentificationNumber
    isOptional: true
  - id: Basic/CompanyRegisterNumber
    name: CompanyRegisterNumber
    isOptional: true
  - id: Basic/EMailAddress
    name: AuthenticationEmail
    isOptional: true
  - id: Basic/Comment
    name: Comment
    isOptional: true
  - id: ${thisModel}/BillingCycle
    name: BillingCycle
  - id: ${thisModel}/State
    name: State
  - id: Basic/BankAccount
    name: BankAccount
    isOptional: true