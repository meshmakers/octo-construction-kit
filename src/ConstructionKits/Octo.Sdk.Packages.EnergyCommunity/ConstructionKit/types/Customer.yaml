$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Customer
  derivedFromCkTypeId: System/Entity
  description: "Customer Information"
  attributes:
  - id: ${thisModel}/FirstName
    name: FirstName
  - id: ${thisModel}/LastName
    name: LastName
  - id: ${thisModel}/CompanyName
    name: CompanyName
    isOptional: true
  - id: ${thisModel}/Address
    name: Address
  - id: ${thisModel}/CustomerNumber
    name: CustomerNumber
  - id: ${thisModel}/CustomerUid
    name: CustomerUid
    isOptional: true
  - id: ${thisModel}/CompanyRegisterNumber
    name: CompanyRegisterNumber
    isOptional: true
  - id: Basic/EMailAddress
    name: AuthenticationEmail
  - id: ${thisModel}/Comment
    name: Comment
    isOptional: true
  associations:
    - id: ${thisModel}/AssociatedFacilities
      targetCkTypeId: ${thisModel}/OperatingFacility
    - id: ${thisModel}/AssociatedUser
      targetCkTypeId: System.Identity/User
