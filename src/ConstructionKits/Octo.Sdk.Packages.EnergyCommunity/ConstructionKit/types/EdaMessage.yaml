$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: EdaMessage
    derivedFromCkTypeId: System/Entity
    description: "Store messages sent and received in the Energy Data Access (EDA) system."
    attributes:
      - id: ${thisModel}/EdaMessageType
        name: MessageType
      - id: ${thisModel}/EdaMessageProcessed
        name: Processed
      - id: ${thisModel}/EdaSenderId
        name: Sender
      - id: ${thisModel}/EdaReceiverId
        name: Receiver
      - id: Basic/Time
        name: CreationDate
      - id: ${thisModel}/EdaMessageId
        name: MessageId
      - id: ${thisModel}/EdaConversationId
        name: ConversationId
        isOptional: true
      - id: ${thisModel}/MeteringPointNumber
        name: MeteringPoint
        isOptional: true
      - id: ${thisModel}/EdaRawMessage
        name: RawMessage
        isOptional: true
    associations:
      - id: ${thisModel}/MessageToProcess
        targetCkTypeId: ${thisModel}/EdaProcess
  