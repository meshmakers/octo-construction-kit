$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: EdaProcess
    derivedFromCkTypeId: Basic/NamedEntity
    description: "Store started processes in the Energy Data Access (EDA) system."
    attributes:
      - id: ${thisModel}/EdaConversationId
        name: ConversationId
      - id: ${thisModel}/EdaProcessFinished
        name: Finished
      - id: Basic/Time
        name: StartTime
      - id: ${thisModel}/EdaSenderId
        name: Sender
      - id: ${thisModel}/EdaReceiverId
        name: Receiver
      - id: ${thisModel}/MeteringPointNumber
        name: MeteringPointNumber
        isOptional: true
      - id: ${thisModel}/EdaProcessSuccess
        name: Success
        isOptional: true
      - id: ${thisModel}/EdaProcessInfo
        name: Info
        isOptional: true
      - id: ${thisModel}/EdaRawMessage
        name: RawMessage
        isOptional: true
