$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: EdaProcess
    derivedFromCkTypeId: System/Entity
    attributes:
      - id: ${thisModel}/EdaProcessName
        name: Name
      - id: Basic/Comment
        name: Comment
      - id: ${thisModel}/EdaConversationId
        name: ConversationId
      - id: ${thisModel}/EdaRequestId
        name: RequestId
        isOptional: true
      - id: ${thisModel}/EdaProcessFinished
        name: Finished
      - id: Basic/Time
        name: StartTime
      - id: ${thisModel}/EdaSenderId
        name: Sender
      - id: ${thisModel}/EdaReceiverId
        name: Receiver
      - id: ${thisModel}/MeteringPointNumber
        name: MeteringPointNumber
        isOptional: true
      - id: ${thisModel}/EdaConsentId
        name: ConsentId
        isOptional: true
      - id: ${thisModel}/EdaRawMessage
        name: RawMessage
        isOptional: true
