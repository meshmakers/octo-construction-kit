$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: EnergyQuantity
  derivedFromCkTypeId: ${System}/Entity
  isAbstract: false
  description: "Describes a quantity of energy, such as consumption or production."
  attributes:
    - id: ${Basic}/TimeRange
      name: TimeRange
    - id: ${Basic}/Quantity
      name: Quantity
    - id: ${this}/DataQuality
      name: DataQuality 
  associations:
    - id: ${System}/ParentChild
      targetCkTypeId: ${this}/MeteringPoint
  indexes:
    - indexType: "Ascending"
      fields:
        - attributePaths:
          - TimeRange.From
          - TimeRange.To
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - TimeRange.From
            - TimeRange.To
            - DataQuality
