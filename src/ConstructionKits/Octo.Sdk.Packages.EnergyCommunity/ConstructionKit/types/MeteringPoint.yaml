$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: MeteringPoint
  derivedFromCkTypeId: Basic/NamedEntity
  isAbstract: false
  description: "Metering Point"
  attributes:
    - id: ${thisModel}/MeteringPointNumber
      name: MeteringPointNumber
    - id: ${thisModel}/MeterReading
      name: MeterReading
      isOptional: true
    - id: ${thisModel}/Timestamp
      name: Timestamp
      isOptional: true
    - id: ${thisModel}/MeterState
      name: State
    - id: ${thisModel}/DataQuality
      name: DataQuality 
      isOptional: true
  associations:
    - id: System/ParentChild
      targetCkTypeId: ${thisModel}/OperatingFacility