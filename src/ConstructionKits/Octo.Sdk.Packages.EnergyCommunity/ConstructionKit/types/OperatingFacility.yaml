$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: OperatingFacility
  derivedFromCkTypeId: System/Entity
  description: "An Operating Facility"
  attributes:
    - id: ${thisModel}/FacilityName
      name: FacilityName
    - id: ${thisModel}/Address
      name: Address
    - id: ${thisModel}/FacilityType
      name: FacilityType
    - id: ${thisModel}/FacilityState
      name: State
  associations:
    - id: ${thisModel}/AssociatedCustomers
      targetCkTypeId: ${thisModel}/Customer
    - id: ${thisModel}/AssociatedMeters
      targetCkTypeId: ${thisModel}/MeteringPoint