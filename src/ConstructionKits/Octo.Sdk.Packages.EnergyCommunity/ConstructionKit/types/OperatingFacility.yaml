$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: OperatingFacility
  derivedFromCkTypeId: Basic/TreeNode
  description: "An Operating Facility"
  attributes:
    - id: Basic/Address
      name: Address
    - id: ${thisModel}/FacilityType
      name: FacilityType
    - id: ${thisModel}/State
      name: State
  associations:
    - id: ${thisModel}/AssociatedCustomer
      targetCkTypeId: ${thisModel}/Customer
