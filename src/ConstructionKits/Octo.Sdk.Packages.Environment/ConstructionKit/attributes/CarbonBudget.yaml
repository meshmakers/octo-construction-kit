$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
- id: BudgetYear
  valueType: Int
  description: "Year of the carbon budget"
- id: BudgetTotal
  valueType: Double
  description: "Total carbon budget for the year"
  metaData:
    - key: Unit
      value: "t"
    - key: Decimals
      value: 1
- id: BudgetConsumed
  valueType: Double
  description: "Carbon budget consumed so far"
  metaData:
    - key: Unit
      value: "t"
    - key: Decimals
      value: 1
- id: TargetFulfillment
  valueType: Double
  description: "Percentage of target fulfillment"
  metaData:
    - key: Unit
      value: "%"
    - key: Decimals
      value: 1
