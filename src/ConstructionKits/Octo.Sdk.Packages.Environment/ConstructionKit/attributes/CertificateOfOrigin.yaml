$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
- id: CertificateIssuer
  valueType: String
  description: "Issuer of the certificate of origin (e.g. HKN-Austria)"
- id: CertificateValidFrom
  valueType: DateTime
  description: "Start of the certificate validity period"
- id: CertificateValidTo
  valueType: DateTime
  description: "End of the certificate validity period"
- id: EnergySource
  valueType: Enum
  valueCkEnumId: ${this}/EnergySource
  description: "Type of renewable energy source"
- id: CertifiedAmount
  valueType: Double
  description: "Amount of certified renewable energy"
  metaData:
    - key: Unit
      value: "MWh"
    - key: Decimals
      value: 2
- id: IsVerified
  valueType: Boolean
  description: "Whether the certificate has been verified"
