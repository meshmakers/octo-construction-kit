$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:

- id: Message
  valueType: String
  isDataStream: true
- id: AlarmState
  valueType: Enum
  valueCkEnumId: ${this}/AlarmState
  isDataStream: true
- id: AlarmType
  valueType: Enum
  valueCkEnumId: ${this}/AlarmType
  isDataStream: true
- id: AlarmSourceType
  valueType: Enum
  valueCkEnumId: ${this}/AlarmSourceType
  isDataStream: true
- id: AlarmPriority
  valueType: Enum
  valueCkEnumId: ${this}/AlarmPriority
  isDataStream: true
- id: AlarmCause
  valueType: String
  isDataStream: true
- id: AlarmReactivatedCount
  valueType: Int
  defaultValues:
    - 0
  isDataStream: true
- id: TagName
  description: Tag or VariableName that is used (when available) that generated this event
  valueType: String
  isDataStream: true
- id: EventCategory
  description: Category of the event
  valueType: String
  isDataStream: true