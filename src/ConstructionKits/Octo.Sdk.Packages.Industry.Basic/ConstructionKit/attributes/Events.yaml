$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:

- id: Message
  valueType: String
  isDataStream: true
- id: EventAlarmState
  valueType: Enum
  valueCkEnumId: ${this}/EventAlarmState
  isDataStream: true
- id: EventAlarmType
  valueType: Enum
  valueCkEnumId: ${this}/EventAlarmType
  isDataStream: true
- id: EventAlarmSource
  valueType: Enum
  valueCkEnumId: ${this}/EventAlarmSource
  isDataStream: true
- id: EventAlarmPriority
  valueType: Enum
  valueCkEnumId: ${this}/EventAlarmPriority
  isDataStream: true
- id: EventAlarmCause
  valueType: String
  isDataStream: true
- id: EventAlarmReactivatedCount
  valueType: Int
  defaultValues:
    - 0
  isDataStream: true
- id: TagName
  description: Tag or VariableName that is used (when available) that generated this event
  valueType: String
  isDataStream: true
- id: EventCategory
  description: Category of the event
  valueType: String
  isDataStream: true