$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:

- id: Message
  valueType: String

- id: EventAlarmState
  valueType: Enum
  valueCkEnumId: ${thisModel}/EventAlarmState
- id: EventAlarmType
  valueType: Enum
  valueCkEnumId: ${thisModel}/EventAlarmType
- id: EventAlarmSource
  valueType: Enum
  valueCkEnumId: ${thisModel}/EventAlarmSource
- id: EventAlarmGroup
  valueType: String
  defaultValues:
    - "Low"
    - "Medium"
    - "High"
- id: EventAlarmCause
  valueType: String
  isDataStream: true
- id: EventAlarmReactivatedCount
  valueType: Int
  defaultValues:
    - 0