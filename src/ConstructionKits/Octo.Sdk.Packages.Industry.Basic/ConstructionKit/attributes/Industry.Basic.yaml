$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
- id: OperatingHoursCounter
  valueType: Int

- id: StandStillCounter
  valueType: Int

- id: State
  valueType: Enum
  valueCkEnumId: ${thisModel}/State

- id: Power
  valueType: Double
  metaData:
    - key: Unit
      value: "kW"
    - key: Decimals
      value: 2
  isDataStream: true
- id: ImportedEnergy
  valueType: Double
  metaData:
    - key: Unit
      value: "kWh"
    - key: Decimals
      value: 2