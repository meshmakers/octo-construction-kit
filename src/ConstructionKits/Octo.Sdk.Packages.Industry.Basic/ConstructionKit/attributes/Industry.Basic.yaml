$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
- id: OperatingHoursCounter
  valueType: Int
  isDataStream: true

- id: StandStillCounter
  valueType: Int
  isDataStream: true

- id: MachineState
  valueType: Enum
  valueCkEnumId: ${this}/MachineState
  isDataStream: true
  defaultValues:
    - 2

- id: Power
  valueType: Double
  metaData:
    - key: Unit
      value: "kW"
    - key: Decimals
      value: 2
  isDataStream: true
- id: ImportedEnergy
  valueType: Double
  isDataStream: true
  metaData:
    - key: Unit
      value: "kWh"
    - key: Decimals
      value: 2