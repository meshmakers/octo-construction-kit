$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
- id: OperatingHoursCounter
  valueType: Int

- id: StandStillCounter
  valueType: Int

- id: MachineState
  valueType: Enum
  valueCkEnumId: ${this}/MachineState
  defaultValues:
    - 2

- id: Power
  valueType: Double
  metaData:
    - key: Unit
      value: "kW"
    - key: Decimals
      value: 2
- id: ImportedEnergy
  valueType: Double
  metaData:
    - key: Unit
      value: "kWh"
    - key: Decimals
      value: 2
      
- id: MachineCapabilities
  valueType: Enum
  valueCkEnumId: ${this}/MachineCapabilities
  defaultValues:
    - 0