$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Event
  derivedFromCkTypeId: Basic/NamedEntity
  description: "An industrial event"
  attributes:
  - id: Basic/Time
    name: Time
  - id: ${thisModel}/Message
    name: Message
  - id: ${thisModel}/TagName
    name: TagName
    isOptional: true
  - id: ${thisModel}/EventCategory
    name: Category
    isOptional: true
  associations:
    - id: ${thisModel}/EventSource
      targetCkTypeId: Basic/Asset

- typeId: Alarm
  derivedFromCkTypeId: ${thisModel}/Event
  description: "An industrial alam event"
  attributes:
    - id: ${thisModel}/EventAlarmState
      name: State      
    - id: ${thisModel}/EventAlarmType
      name: Type
    - id: ${thisModel}/EventAlarmSource
      name: Source
    - id: ${thisModel}/EventAlarmPriority
      name: EventAlarmPriority
    - id: ${thisModel}/EventAlarmCause
      name: Cause
    - id: ${thisModel}/EventAlarmReactivatedCount
      name: ReactivatedCount
