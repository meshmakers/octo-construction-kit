$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Event
  derivedFromCkTypeId: ${Basic}/NamedEntity
  description: "An industrial event"
  attributes:
  - id: ${Basic}/Time
    name: Time
  - id: ${this}/Message
    name: Message
  - id: ${this}/TagName
    name: TagName
    isOptional: true
  - id: ${this}/EventCategory
    name: Category
    isOptional: true
  associations:
    - id: ${this}/EventSource
      targetCkTypeId: ${Basic}/Asset

- typeId: Alarm
  derivedFromCkTypeId: ${this}/Event
  description: "An industrial alam event"
  attributes:
    - id: ${this}/EventAlarmState
      name: State      
    - id: ${this}/EventAlarmType
      name: Type
    - id: ${this}/EventAlarmSource
      name: Source
    - id: ${this}/EventAlarmPriority
      name: EventAlarmPriority
    - id: ${this}/EventAlarmCause
      name: Cause
    - id: ${this}/EventAlarmReactivatedCount
      name: ReactivatedCount
