$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Event
  derivedFromCkTypeId: ${Basic}/NamedEntity
  description: "An industrial event"
  attributes:
  - id: ${this}/EventReceived
    name: Received
  - id: ${this}/Message
    name: Message
  - id: ${this}/TagName
    name: TagName
    isOptional: true
  - id: ${this}/EventCategory
    name: Category
    isOptional: true
  associations:
    - id: ${this}/EventSource
      targetCkTypeId: ${Basic}/Asset

- typeId: Alarm
  derivedFromCkTypeId: ${this}/Event
  description: "An industrial alarm event"
  attributes:
    - id: ${this}/AlarmState
      name: State
    - id: ${this}/AlarmType
      name: Type
    - id: ${this}/AlarmSourceType
      name: Source
    - id: ${this}/AlarmPriority
      name: Priority
    - id: ${this}/AlarmCause
      name: Cause
    - id: ${this}/AlarmReactivatedCount
      name: ReactivatedCount
    - id: ${this}/AlarmLastModified
      name: LastModified
    - id: ${this}/AlarmAcknowledged
      name: Acknowledged
      isOptional: true
    - id: ${this}/AlarmCleared
      name: Cleared
      isOptional: true
    - id: ${this}/AlarmReactivated
      name: Reactivated
      isOptional: true
