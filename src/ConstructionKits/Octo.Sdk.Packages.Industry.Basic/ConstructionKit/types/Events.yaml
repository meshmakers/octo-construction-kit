$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Event
  derivedFromCkTypeId: Basic/NamedEntity
  attributes:
  - id: Basic/Time
    name: Time
  - id: ${thisModel}/Message
    name: Message
  associations:
    - id: ${thisModel}/EventSource
      targetCkTypeId: Basic/Asset

- typeId: Alarm
  derivedFromCkTypeId: Industry.Basic/Event
  attributes:
    - id: ${thisModel}/EventAlarmState
      name: State
    - id: ${thisModel}/EventAlarmType
      name: Type
    - id: ${thisModel}/EventAlarmSource
      name: Source
    - id: ${thisModel}/EventAlarmGroup
      name: Group
      autoCompleteValues:
        - "Low"
        - "Medium"
        - "High"
    - id: ${thisModel}/EventAlarmCause
      name: Cause
    - id: ${thisModel}/EventAlarmReactivatedCount
      name: ReactivatedCount
