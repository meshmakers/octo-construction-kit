$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Machine
  derivedFromCkTypeId: ${Basic}/Asset
  attributes:
  - id: ${Basic}/NamePlate
    name: NamePlate
    isOptional: true
  - id: ${this}/OperatingHoursCounter
    name: OperatingHours
    isOptional: true
  - id: ${this}/StandStillCounter
    name: StandStillCounter
    isOptional: true
  - id: ${this}/MachineState
    name: MachineState
  - id: ${this}/MachineCapabilities
    name: MachineCapabilities
    isOptional: true