$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Battery
  derivedFromCkTypeId: IndustryBasic/Machine
  attributes:
  - id: ${thisModel}/Voltage
    name: Voltage
    isOptional: true
  - id: ${thisModel}/Ampere
    name: Ampere
  - id: ${thisModel}/Power
    name: Power
  - id: ${thisModel}/ImportedEnergy
    name: ImportedEnergy
    isOptional: true
  - id: ${thisModel}/ExportedEnergy
    name: ExportedEnergy
    isOptional: true
  - id: ${thisModel}/SoC
    name: SoC
  - id: ${thisModel}/SoH
    name: SoH
    isOptional: true
  - id: ${thisModel}/NumofCycles
    name: NumofCycles
    isOptional: true
  - id: ${thisModel}/Capacity
    name: Capacity
    isOptional: true
  - id: Basic/Temperature
    name: Temperature
    isOptional: true
  associations:
    - id: System/ParentChild
      targetCkTypeId: ${thisModel}/Inverter