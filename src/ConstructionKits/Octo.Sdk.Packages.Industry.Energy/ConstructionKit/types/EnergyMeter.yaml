$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: EnergyMeter
  derivedFromCkTypeId: Industry.Basic/Machine
  attributes:
  - id: ${thisModel}/Voltage
    name: Voltage
    isOptional: true
  - id: ${thisModel}/Ampere
    name: Ampere
  - id: Industry.Basic/Power
    name: Power
  - id: ${thisModel}/ApparentPower
    name: ApparentPower
    isOptional: true
  - id: ${thisModel}/ReactivePower
    name: ReactivePower
    isOptional: true
  - id: Industry.Basic/ImportedEnergy
    name: ImportedEnergy
    isOptional: true
  - id: ${thisModel}/ExportedEnergy
    name: ExportedEnergy
    isOptional: true
  - id: ${thisModel}/Frequency
    name: Frequency
    isOptional: true
  - id: ${thisModel}/PhaseInfoL1
    name: ACL1
    isOptional: true
  - id: ${thisModel}/PhaseInfoL2
    name: ACL2
    isOptional: true
  - id: ${thisModel}/PhaseInfoL3
    name: ACL3
    isOptional: true