$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: EnergyMeter
  derivedFromCkTypeId: ${Industry.Basic}/Machine
  attributes:
  - id: ${this}/Voltage
    name: Voltage
    isOptional: true
  - id: ${this}/Ampere
    name: Ampere
  - id: ${Industry.Basic}/Power
    name: Power
  - id: ${this}/ApparentPower
    name: ApparentPower
    isOptional: true
  - id: ${this}/ReactivePower
    name: ReactivePower
    isOptional: true
  - id: ${Industry.Basic}/ImportedEnergy
    name: ImportedEnergy
    isOptional: true
  - id: ${this}/ExportedEnergy
    name: ExportedEnergy
    isOptional: true
  - id: ${this}/Frequency
    name: Frequency
    isOptional: true
  - id: ${this}/PhaseInfoL1
    name: ACL1
    isOptional: true
  - id: ${this}/PhaseInfoL2
    name: ACL2
    isOptional: true
  - id: ${this}/PhaseInfoL3
    name: ACL3
    isOptional: true