$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: EnergyStorage
  derivedFromCkTypeId: ${Industry.Basic}/Machine
  attributes:
  - id: ${this}/Voltage
    name: Voltage
    isOptional: true
  - id: ${this}/Ampere
    name: Ampere
  - id: ${Industry.Basic}/Power
    name: Power
  - id: ${Industry.Basic}/ImportedEnergy
    name: ImportedEnergy
    isOptional: true
  - id: ${this}/ExportedEnergy
    name: ExportedEnergy
    isOptional: true
  - id: ${this}/SoC
    name: SoC
  - id: ${this}/SoH
    name: SoH
    isOptional: true
  - id: ${this}/NumOfCycles
    name: NumOfCycles
    isOptional: true
  - id: ${this}/Capacity
    name: Capacity
    isOptional: true
  - id: ${Basic}/Temperature
    name: Temperature
    isOptional: true
