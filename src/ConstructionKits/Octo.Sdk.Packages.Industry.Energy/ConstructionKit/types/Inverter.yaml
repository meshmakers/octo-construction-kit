$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Inverter
  derivedFromCkTypeId: ${Industry.Basic}/Machine
  attributes:
    - id: ${this}/DCVoltage
      name: DCVoltage
      isOptional: true
    - id: ${this}/DCAmpere
      name: DCAmpere
    - id: ${this}/Voltage
      name: Voltage
      isOptional: true
    - id: ${this}/Ampere
      name: Ampere
    - id: ${this}/MaximumPower
      name: MaximumPower
    - id: ${Industry.Basic}/Power
      name: Power
    - id: ${this}/PhaseInfoL1
      name: ACL1
      isOptional: true
    - id: ${this}/PhaseInfoL2
      name: ACL2
      isOptional: true
    - id: ${this}/PhaseInfoL3
      name: ACL3
      isOptional: true

