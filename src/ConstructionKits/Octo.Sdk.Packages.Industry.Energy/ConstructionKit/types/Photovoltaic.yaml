$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Photovoltaic
  derivedFromCkTypeId: Basic/Asset


- typeId: Photovoltaic.String
  derivedFromCkTypeId: Basic/Asset
  attributes:
    - id: ${thisModel}/NumOfModules
      name: NumOfModules
    - id: Industry.Basic/Power
      name: Power
      isOptional: true
  associations:
    - id: System/ParentChild
      targetCkTypeId: Industry.Energy/Inverter
      
      
- typeId: Photovoltaic.Module
  derivedFromCkTypeId: Industry.Basic/Machine
  attributes:
    - id: ${thisModel}/PeakPower
      name: PeakPower
    - id: Industry.Basic/Power
      name: Power
      isOptional: true
  associations:
    - id: System/ParentChild
      targetCkTypeId: Industry.Energy/Photovoltaic.String