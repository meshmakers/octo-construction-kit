$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Photovoltaic
  derivedFromCkTypeId: ${Basic}/Asset


- typeId: Photovoltaic.String
  derivedFromCkTypeId: ${Basic}/Asset
  attributes:
    - id: ${this}/NumOfModules
      name: NumOfModules
    - id: ${Industry.Basic}/Power
      name: Power
      isOptional: true

- typeId: Photovoltaic.Module
  derivedFromCkTypeId: ${Industry.Basic}/Machine
  attributes:
    - id: ${this}/PeakPower
      name: PeakPower
    - id: ${Industry.Basic}/Power
      name: Power
      isOptional: true
