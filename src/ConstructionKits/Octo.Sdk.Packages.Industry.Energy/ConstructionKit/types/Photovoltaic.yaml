$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Photovoltaic
  derivedFromCkTypeId: Basic/Asset


- typeId: Photovoltaic.String
  derivedFromCkTypeId: Basic/Asset
  attributes:
    - id: IndustryEnergy/NumOfModules
      name: NumOfModules
    - id: IndustryEnergy/Power
      name: Power
      isOptional: true
  associations:
    - id: System/ParentChild
      targetCkTypeId: IndustryEnergy/Inverter
      
      
- typeId: Photovoltaic.Module
  derivedFromCkTypeId: IndustryBasic/Machine
  attributes:
    - id: IndustryEnergy/PeakPower
      name: PeakPower
    - id: IndustryEnergy/Power
      name: Power
      isOptional: true
  associations:
    - id: System/ParentChild
      targetCkTypeId: IndustryEnergy/Photovoltaic.String