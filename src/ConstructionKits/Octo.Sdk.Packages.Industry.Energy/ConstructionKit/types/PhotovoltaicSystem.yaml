$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: PhotovoltaicSystem
  derivedFromCkTypeId: ${Basic}/Asset

- typeId: PhotovoltaicSystem.String
  derivedFromCkTypeId: ${Basic}/Asset
  attributes:
    - id: ${this}/NumOfModules
      name: NumOfModules
    - id: ${Industry.Basic}/Power
      name: Power
      isOptional: true

- typeId: PhotovoltaicSystem.Module
  derivedFromCkTypeId: ${Industry.Basic}/Machine
  attributes:
    - id: ${this}/PeakPower
      name: PeakPower
    - id: ${Industry.Basic}/Power
      name: Power
      isOptional: true
