$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: HeatMeter
  derivedFromCkTypeId: ${Industry.Basic}/Machine
  attributes:
  - id: ${this}/Volume
    name: Volume
    isOptional: true
  - id: ${this}/Flow
    name: Flow
    isOptional: true
  - id: ${Industry.Basic}/Power
    name: Power
    isOptional: true
  - id: ${Industry.Basic}/ImportedEnergy
    name: ImportedEnergy
  - id: ${Basic}/MinTemperature
    name: ReturnTemperature
    isOptional: true
  - id: ${Basic}/MaxTemperature
    name: FlowTemperature
    isOptional: true
