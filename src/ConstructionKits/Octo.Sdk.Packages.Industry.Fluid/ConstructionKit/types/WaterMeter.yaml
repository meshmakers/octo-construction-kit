$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: WaterMeter
  derivedFromCkTypeId: ${Industry.Basic}/Machine
  attributes:
  - id: ${this}/NetVolume
    name: NetVolume
  - id: ${this}/Volume
    name: Volume
    isOptional: true
  - id: ${this}/ReverseVolume
    name: ReverseVolume
    isOptional: true
  - id: ${Basic}/AvgTemperature
    name: AvgWaterTemperature
    isOptional: true
  - id: ${Basic}/MinTemperature
    name: MinWaterTemperature
    isOptional: true
  - id: ${Basic}/MaxTemperature
    name: MaxWaterTemperature
    isOptional: true
