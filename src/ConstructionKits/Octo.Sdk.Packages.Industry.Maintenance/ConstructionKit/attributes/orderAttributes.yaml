$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
  - id: OrderNumber
    valueType: String
  - id: CostCategory
    valueType: Enum
    valueCkEnumId: ${this}/CostCategory
  - id: OrderPriority
    valueType: Enum
    valueCkEnumId: ${this}/OrderPriority
    defaultValues:
      - 0
  - id: PlannedCosts
    valueType: Double
  - id: ActualCosts
    valueType: Double
  - id: ProjectNumber
    valueType: String
  - id: TotalCosts
    valueType: Double
  - id: InternalCosts
    valueType: Double
  - id: ExternalCosts
    valueType: Double
  - id: MaterialCosts
    valueType: Double
  - id: AggregationType
    valueType: Enum
    valueCkEnumId: ${this}/AggregationType  
  - id: AggregationDate
    valueType: DateTime
  - id: FeedbackNumber
    valueType: String
  - id: StartDateTime
    valueType: DateTime
  - id: EndDateTime
    valueType: DateTime
  - id: OrderState
    valueType: Enum
    valueCkEnumId: ${this}/OrderState
  