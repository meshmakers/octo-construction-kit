$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: EnergyBalance
    derivedFromCkTypeId: ${System}/Entity
    description: Describes an energy balance with a balance number.
    attributes:
      - id: ${this}/EnergyBalanceGroup
        name: Group
      - id: ${this}/EnergyBalanceProduct
        name: Product
      - id: ${this}/EnergyBalanceUnit
        name: Unit
      - id: ${System}/Description
        name: Description
        isOptional: true
      - id: ${Basic}/Quantity
        name: Quantity
      - id: ${Basic}/Time
        name: Time
    associations:
      - id: ${this}/RelatedMachine
        targetCkTypeId: ${Basic}/TreeNode