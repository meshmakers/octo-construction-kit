$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: Order
  derivedFromCkTypeId: ${System}/Entity
  indexes:
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - OrderNumber
  attributes:
    - id: ${this}/OrderNumber
      name: OrderNumber
    - id: ${this}/ServiceType
      name: ServiceType
    - id: ${this}/OrderType
      name: OrderType
    - id: ${this}/CreatedAt
      name: CreatedAt
    - id: ${this}/OrderText
      name: OrderText
      isOptional: true
    - id: ${this}/PlannedCosts
      name: PlannedCosts
      isOptional: true
    - id: ${this}/ActualCosts
      name: ActualCosts
      isOptional: true
    - id: ${this}/ProjectNumber
      name: ProjectNumber
      isOptional: true
    - id: ${this}/OrderState
      name: OrderState
      isOptional: true
    - id: ${this}/OrderPriority
      name: OrderPriority
  associations:
    - id: ${this}/RelatedEvent
      targetCkTypeId: ${Industry.Basic}/Event
    - id: ${this}/RelatedMachine
      targetCkTypeId: ${Industry.Basic}/Machine