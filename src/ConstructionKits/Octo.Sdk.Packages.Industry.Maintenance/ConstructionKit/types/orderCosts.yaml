$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: OrderCosts
    derivedFromCkTypeId: ${System}/Entity
    attributes:
      - id: ${this}/TotalCosts
        name: TotalCosts
      - id: ${this}/InternalCosts
        name: InternalCosts
      - id: ${this}/ExternalCosts
        name: ExternalCosts
      - id: ${this}/MaterialCosts
        name: MaterialCosts
    associations:
      - id: ${this}/Costs
        targetCkTypeId: ${this}/Order
