$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: OrderFeedback
  derivedFromCkTypeId: ${System}/Entity
  attributes:
    - id: ${this}/FeedbackNumber
      name: FeedbackNumber
    - id: ${this}/StartDateTime
      name: StartDateTime
    - id: ${this}/EndDateTime
      name: EndDateTime
      isOptional: true
  associations:
    - id: ${this}/ReportingEmployee
      targetCkTypeId: ${this}/Employee
    - id: ${System}/ParentChild
      targetCkTypeId: ${this}/Order