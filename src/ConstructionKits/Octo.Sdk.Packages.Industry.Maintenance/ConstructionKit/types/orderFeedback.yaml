$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: OrderFeedback
  derivedFromCkTypeId: System/Entity
  attributes:
    - id: ${thisModel}/FeedbackNumber
      name: FeedbackNumber
    - id: ${thisModel}/StartDateTime
      name: StartDateTime
    - id: ${thisModel}/EndDateTime
      name: EndDateTime
      isOptional: true
  associations:
    - id: ${thisModel}/ReportingEmployee
      targetCkTypeId: ${thisModel}/Employee
