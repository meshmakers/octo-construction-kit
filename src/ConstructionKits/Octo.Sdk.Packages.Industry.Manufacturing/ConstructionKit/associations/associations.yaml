$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
associationRoles:
- id: MachineOrderAssignment
  description: "Defined on ProductionOrderItem → Machine. Creates: ProductionOrderItem.Machine (the assigned machine) and Machine.OrderItems (all order items assigned to this machine)"
  inboundName: OrderItems
  outboundName: Machine
  inboundMultiplicity: One
  outboundMultiplicity: N

- id: MachineAssignment
  description: "Defined on ShiftMachine → Machine. Creates: ShiftMachine.Machine (the physical machine) and Machine.ShiftAssignments (all shift assignments for this machine)"
  inboundName: ShiftAssignments
  outboundName: Machine
  inboundMultiplicity: N
  outboundMultiplicity: One

- id: MachineEmployeeAssignment
  description: "Defined on ShiftMachine → Employee. Creates: ShiftMachine.AssignedEmployees (employees who have access to this machine) and Employee.MachineAssignments (machines this employee has access to)"
  inboundName: ShiftMachines
  outboundName: Employees
  inboundMultiplicity: N
  outboundMultiplicity: N

- id: ShiftOrderItemEmployeeAssignment
  description: "Defined on ShiftOrderItem → Employee. Creates: ShiftOrderItem.AssignedEmployees (employees working on this order item) and Employee.AssignedMachines (order items assigned to this employee)"
  inboundName: ShiftOrderItems
  outboundName: Employees
  inboundMultiplicity: N
  outboundMultiplicity: N

- id: ShiftOrderToProductionOrder
  description: "Defined on ShiftOrderItem → ProductionOrderItem. Creates: ShiftOrderItem.ProductionOrderItem (what is being produced) and ProductionOrderItem.ShiftOrderItems (all shift production records for this order)"
  inboundName: ShiftOrderItems
  outboundName: ProductionOrderItem
  inboundMultiplicity: N
  outboundMultiplicity: One

- id: FeedbackResponsible
  description: "Defined on PartialFeedback → Employee. Creates: PartialFeedback.Employee (the employee responsible for this feedback) and Employee.PartialFeedbacks (all feedback entries created by this employee)"
  inboundName: PartialFeedbacks
  outboundName: Employee
  inboundMultiplicity: N
  outboundMultiplicity: One