$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
  - id: ProductionStartDateTime
    description: "Date and time when production actually started"
    valueType: DateTime
  - id: ProductionEndDateTime
    description: "Date and time when production actually ended"
    valueType: DateTime
  - id: HaltTime
    description: "Cumulative seconds the machine was not in 'running' state for the current ProductionOrderItem."
    valueType: Int