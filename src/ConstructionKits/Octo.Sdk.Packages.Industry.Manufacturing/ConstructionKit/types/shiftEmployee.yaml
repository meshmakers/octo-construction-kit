$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: ShiftEmployee
  description: "Employee check-in to a shift, linking employee to assigned machines. Creation triggers automatic ShiftOrderItem generation for active production orders on assigned machines."
  derivedFromCkTypeId: ${System}/Entity
  associations:
    - id: ${this}/EmployeeShiftAssignment
      targetCkTypeId: ${this}/Shift
    - id: ${this}/ShiftEmployeeToEmployee
      targetCkTypeId: ${Basic}/Employee
    - id: ${this}/EmployeeMachineAssignment
      targetCkTypeId: ${this}/ShiftMachine
