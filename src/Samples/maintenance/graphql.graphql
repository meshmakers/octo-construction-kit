mutation {
    runtime {
        basicTrees {
            create(
                entities: [
                    {
                        name: "Business Area"
                        description: "Represents Business Areas (Betriebsbereiche) of the organization"
                    },
                    {
                        name: "Functional Location"
                        description: "Represents Functional Locations (Technische Plätze) of the organization"
                    },
                    {
                        name: "Workspace"
                        description: "Represents Workspace (Arbeitsplätze) of the organization"
                    }
                ]
            )
            {
                rtId
                ckTypeId
                name
            }
        }
    }
}
