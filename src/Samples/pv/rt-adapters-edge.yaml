$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication-2.0.0
entities:
  - rtId: 5fc8fc3d8b2fc75f925e21af
    ckTypeId: System.Communication/Pool
    attributes:
      - id: System/Name
        value: k8sfirmianstrasse
    associations: []
  - rtId: 5fc8fc3d8b2fc75f925e21ba
    ckTypeId: System.Communication/EdgeAdapter
    attributes:
      - id: System/Name
        value: Modbus PV
      - id: System.Communication/AdapterConfiguration
        value: ""
      - id: System.Communication/Deployment.ImageName
        value: meshmakers/octo-communication-plug-modbus      
      - id: System.Communication/Deployment.ImageVersion
        value: "999.0.0.0"
    associations:
      - roleId: System.Communication/Manages
        targetRtId: 5fc8fc3d8b2fc75f925e21af
        targetCkTypeId: System.Communication/Pool
        
  # Data pipelines including mesh and edge pipelines
  - rtId: 5fc8fc3d8b2fc75f925e21bb
    ckTypeId: System.Communication/DataPipeline
    attributes:
      - id: System/Name
        value: PV Firmianstraße
    associations:
      - roleId: System/ParentChild
        targetRtId: 5fc8fc3d8b2fc75f925e21ba
        targetCkTypeId: System.Communication/EdgeAdapter        
  - rtId: 66b07d2995797e1617fd3164
    ckTypeId: System.Communication/EdgePipeline
    associations:
      - roleId: System/ParentChild
        targetRtId: 5fc8fc3d8b2fc75f925e21bb
        targetCkTypeId: System.Communication/DataPipeline
        attributes: []
    attributes:
      - id: System/Name
        value: Edge Pipeline
      - id: System/Enabled
        value: true
      - id: System.Communication/PipelineDefinition
        value: >-
          triggers:
            - type: FromPolling@1
              interval: 00:00:10
          transformations:
            - type: ReadModbusRegister@1
              serverConfigurations:
                - server: 192.168.14.31
                  mappings:
                    - register: 69
                      valueType: INT16
                      registerType: ReadHoldingRegister
                      targetPath: batteryPower
                    - register: 67
                      valueType: UINT16
                      registerType: ReadHoldingRegister
                      targetPath: productionPower
                    - register: 75
                      valueType: INT32
                      registerType: ReadHoldingRegister
                      targetPath: additionalProductionPower
                    - register: 82
                      valueType: UINT16
                      registerType: ReadHoldingRegister
                      targetPath: batteryStateOfCharge
                    - register: 71
                      valueType: INT32
                      registerType: ReadHoldingRegister
                      targetPath: consumption
                    - register: 73
                      valueType: INT32
                      registerType: ReadHoldingRegister
                      targetPath: net
            - type: LinearScaler@1
              path: $.additionalProductionPower
              targetPath: additionalProductionPower
              scaleInputMin: 0
              scaleInputMax: -10000
              scaleOutputMin: 0
              scaleOutputMax: 10000
            - type: BufferData@1
              bufferTime: 00:01:00
              transformations:
                - type: ToPipelineDataEvent@1
                  description: Load to event hub
                  targetPath: "$.data"
  - rtId: 66b07d2995797e1617fd3167
    ckTypeId: System.Communication/MeshPipeline
    associations:
      - roleId: System/ParentChild
        targetRtId: 5fc8fc3d8b2fc75f925e21bb
        targetCkTypeId: System.Communication/DataPipeline
    attributes:
      - id: System/Name
        value: Mesh Pipeline
      - id: System/Enabled
        value: true
      - id: System.Communication/PipelineDefinition
        value: >-
          triggers:
            - type: FromPipelineDataEvent@1
              description: Retrieve from distributed event hub message
          transformations:
            - type: ForEach@1
              iterationPath: $.data
              targetPath: $.x
              documentMode: REPLACE
              mergePath: $._updateItems
              transformations:
                - type: CreateUpdateInfo@1
                  description: update main building
                  targetPath: $._updateItems
                  targetValueKind: Array
                  targetValueWriteMode: Append
                  updateKind: UPDATE
                  rtId: 5fc8fda18b2fc75f925e21af
                  ckTypeId: Industry.Energy/Photovoltaic.Module
                  timestampPath: $.key.timestamp
                  attributeUpdates:
                    - attributeName: PeakPower
                      attributeValueType: Double
                      valuePath: $.key.productionPower
                - type: CreateUpdateInfo@1
                  description: update outer building
                  targetPath: $._updateItems
                  targetValueKind: Array
                  targetValueWriteMode: Append
                  updateKind: UPDATE
                  rtId: 5fc8fda18b2fc75f925e21c0
                  ckTypeId: Industry.Energy/Photovoltaic.Module
                  timestampPath: $.key.timestamp
                  attributeUpdates:
                    - attributeName: PeakPower
                      attributeValueType: Double
                      valuePath: $.key.additionalProductionPower
                - type: CreateUpdateInfo@1
                  description: update battery
                  targetPath: $._updateItems
                  targetValueKind: Array
                  targetValueWriteMode: Append
                  updateKind: UPDATE
                  rtId: 5fc8fda18b2fc75f925e21ae
                  ckTypeId: Industry.Energy/Battery
                  timestampPath: $.key.timestamp
                  attributeUpdates:
                    - attributeName: Power
                      attributeValueType: Double
                      valuePath: $.key.batteryPower
                    - attributeName: SoC
                      attributeValueType: Int
                      valuePath: $.key.batteryStateOfCharge
                - type: CreateUpdateInfo@1
                  description: update net
                  targetPath: $._updateItems
                  targetValueKind: Array
                  targetValueWriteMode: Append
                  updateKind: UPDATE
                  rtId: 5fc8fda18b2fc75f925e21c1
                  ckTypeId: Industry.Energy/EnergyMeter
                  timestampPath: $.key.timestamp
                  attributeUpdates:
                    - attributeName: Power
                      attributeValueType: Double
                      valuePath: $.key.net
                - type: CreateUpdateInfo@1
                  description: update consumption
                  targetPath: $._updateItems
                  targetValueKind: Array
                  targetValueWriteMode: Append
                  updateKind: UPDATE
                  rtId: 5fc8fda18b2fc75f925e21c2
                  ckTypeId: Industry.Energy/EnergyMeter
                  timestampPath: $.key.timestamp
                  attributeUpdates:
                    - attributeName: Power
                      attributeValueType: Double
                      valuePath: $.key.consumption
            - type: Flatten@1
              path: $.x[*].[*]
              targetPath: $._updateItems
            - type: Project@1
              fields:
                - path: $.x
            - type: SaveInTimeSeries@1
              path: _updateItems
            - type: FilterLatestUpdateInfo@1
              path: _updateItems
              targetPath: _updateItems
            - type: ApplyChanges@1
              path: _updateItems