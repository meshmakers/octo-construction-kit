$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication
entities:
  - rtId: 5fc8fc3d8b2fc75f925e21af
    ckTypeId: System.Communication/CommunicationPool
    attributes:
      - id: System/Name
        value: k8sfirmianstrasse
    associations: []
  - rtId: 5fc8fc3d8b2fc75f925e21ba
    ckTypeId: System.Communication/Plug
