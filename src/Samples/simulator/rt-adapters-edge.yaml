$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication-2.0.3
entities:
  - rtId: 65d5c447b420da3fb12381bb
    ckTypeId: System.Communication/Pool
    attributes:
      - id: System/Name
        value: simulation
    associations: []
  - rtId: 65d5c447b420da3fb12381bc
    ckTypeId: System.Communication/EdgeAdapter
    attributes:
      - id: System/Name
        value: Simulation       
      - id: System.Communication/AdapterConfiguration
        value: ""
      - id: System.Communication/Deployment.ImageName
        value: meshmakers/octo-communication-adapter-simulation     
      - id: System.Communication/Deployment.ImageVersion
        value: "999.0.0.0"
    associations:
      - roleId: System.Communication/Manages
        targetRtId: 65d5c447b420da3fb12381bb
        targetCkTypeId: System.Communication/Pool
        
    # Data pipelines of plug
  - rtId: 65d5c447b420da3fb12381bd
    ckTypeId: System.Communication/DataPipeline
    attributes:
      - id: System/Name
        value: Simulation Pipeline
  - rtId: 65d5c447b420da3fb12381be
    ckTypeId: System.Communication/EdgePipeline
    attributes:
      - id: System/Enabled
        value: true
      - id: System.Communication/PipelineDefinition
        value: >-
          triggers:
            - type: FromPolling@1
              interval: 00:00:10
          transformations:
            - type: Simulation@1
              description: Simulates data
              simulations:
                - targetPath: Sinus
                  simulatorKey: Math.Sinus
                - targetPath: Constant_6
                  simulatorKey: Math.Constant
                  configuration: "{ amplitude: 6}"
                - targetPath: Triangle
                  simulatorKey: Math.Triangle
            - type: SelectByPath@1
              description: Transform object node
              selectPath:
                - path: "$.Sinus"
                  targetPath: Sinus5
                  transformations:
                    - type: LinearScaler@1
                      scaleInputMin: 0
                      scaleInputMax: 1
                      scaleOutputMin: 0
                      scaleOutputMax: 1000
                - path: "$.Constant_6"
                  targetPath: Constant
                  transformations:
                    - type: LinearScaler@1
                      scaleInputMin: 0
                      scaleInputMax: 10
                      scaleOutputMin: 0
                      scaleOutputMax: 1000
            - type: Project@1
              fields:
                - path: "$.Sinus"
                - path: "$.Constant_6"
            - type: ToPipelineDataEvent@1
              description: Load to event hub
    associations:
      - roleId: System/ParentChild
        targetRtId: 65d5c447b420da3fb12381bd
        targetCkTypeId: System.Communication/DataPipeline
      - roleId: System.Communication/Executes
        targetRtId: 65d5c447b420da3fb12381bc
        targetCkTypeId: System.Communication/EdgeAdapter   
  - rtId: 65d5c447b420da3fb12381bf
    ckTypeId: System.Communication/MeshPipeline
    attributes:
      - id: System/Enabled
        value: true 
      - id: System.Communication/PipelineDefinition
        value: >-
          triggers:
            - type: FromPipelineDataEvent@1
              description: Retrieve from distributed event hub message
          transformations: 
            - type: CreateUpdateInfo@1
              description: Update consumption firmianstraße
              targetPath: $._updateItems
              targetValueKind: Array
              targetValueWriteMode: Append
              updateKind: UPDATE
              rtId: 65dc6d24cc529cdc46c84fd4
              ckTypeId: OctoSdkDemo/MeteringPoint
              attributeUpdates: 
                - attributeName: MeterReading
                  attributeValueType: Double
                  valuePath: $.Sinus5
            - type: CreateUpdateInfo@1
              description: Update production firmianstraße
              targetPath: $._updateItems
              targetValueKind: Array
              targetValueWriteMode: Append
              updateKind: UPDATE
              rtId: 65dc6d24cc529cdc46c84fd5
              ckTypeId: OctoSdkDemo/MeteringPoint
              attributeUpdates: 
                - attributeName: MeterReading
                  attributeValueType: Double
                  valuePath: $.Constant        
            - type: ApplyChanges@1
              path: $._updateItems
            - type: EnrichWithMongoData@1
              path: $._updateItems
              targetPath: $._updateItems
              targetValueKind: Simple
              targetValueWriteMode: Overwrite
              rtId: 65dc6d24cc529cdc46c84fd4
              ckTypeId: OctoSdkDemo/MeteringPoint
              attributeUpdates: 
                - attributeName: MeteringPointNumber
                  attributeValueType: String
                  valuePath: $.meteringPointNumber
              description: update
    associations:
      - roleId: System/ParentChild
        targetRtId: 65d5c447b420da3fb12381bd
        targetCkTypeId: System.Communication/DataPipeline
      - roleId: System.Communication/Executes
        targetRtId: 66004fda527ac79a03ecedd7
        targetCkTypeId: System.Communication/MeshAdapter
  - rtId: 66f8fff6a51682210fac440a
    ckTypeId: System.Communication/DataPipeline
    attributes:
      - id: System/Name
        value: triggertest
      - id: System/Description
  - rtId: 66f8fff6a51682210fac440b
    ckTypeId: System.Communication/MeshPipeline
    associations:
      - roleId: System/ParentChild
        targetRtId: 66f8fff6a51682210fac440a
        targetCkTypeId: System.Communication/DataPipeline
      - roleId: System.Communication/Executes
        targetRtId: 66004fda527ac79a03ecedd7
        targetCkTypeId: System.Communication/MeshAdapter        
    attributes:
      - id: System/Name
        value: Mesh Pipeline
      - id: System/Enabled
        value: true
      - id: System.Communication/PipelineDefinition
        value: >-
          triggers:
            - type: FromPipelineTriggerEvent@1
          transformations:
            - type: Simulation@1
              simulations:
                - targetPath: $.goal
                  simulatorKey: Text.Lorem.Word
                  configuration: "{count:4}"
                - targetPath: $.name
                  simulatorKey: Text.Lorem.Word
                  configuration: "{count:1}"        
            - type: CreateUpdateInfo@1
              targetPath: _updateItems
              targetValueKind: Array
              targetValueWriteMode: Append    
              updateKind: INSERT
              ckTypeId: Environment/EnvironmentalGoal
              attributeUpdates:
                - attributeName: Name
                  attributeValueType: String
                  valuePath: $.name      
                - attributeName: GoalText
                  attributeValueType: String
                  valuePath: $.goal
                - attributeName: GoalStatus
                  attributeValueType: Enum
                  value: OnTrack 
            - type: Project@1
              fields:
              - path: $.goal
            - type: ApplyChanges@1
              path: _updateItems
      