$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication
entities:
  - rtId: 65d5c447b420da3fb12381bb
    ckTypeId: System.Communication/CommunicationPool
    attributes:
      - id: System/Name
        value: simulation
    associations: []
  - rtId: 65d5c447b420da3fb12381bc
    ckTypeId: System.Communication/CommunicationAdapter
    attributes:
      - id: System.Communication/AdapterType
        value: Meshmakers.Plugs.Simulator
      - id: System.Communication/AdapterConfiguration
        value: "{ \"interval\": \"00:00:10\" }"
      - id: System.Communication/Deployment.ImageName
        value: meshmakers/octo-communication-plug-simulation      
      - id: System.Communication/Deployment.ImageVersion
        value: "999.0.0.0"
    associations:
      - roleId: System/ParentChild
        targetRtId: 65d5c447b420da3fb12381bb
        targetCkTypeId: System.Communication/CommunicationPool
        
    # Data pipelines of plug
  - rtId: 65d5c447b420da3fb12381bd
    ckTypeId: System.Communication/DataPipeline
    attributes:
      - id: System/Name
        value: Simulation Pipeline
      - id: System.Communication/AdapterPipelineConfiguration
        value: "transformations: \n  - type: RetrieveFromMessage@1\n    description: Retrieve from distributed event hub message\n  - type: GetRtEntitiesById@1\n    targetPropertyName: EnergyMeterResult\n    ckTypeId: IndustryEnergy-1.0.0/EnergyMeter-1.0.0\n    rtIds: \n      - 65dc6d24cc529cdc46c84fcc\n    description: Retrieve RtEntity if exists\n  - type: CreateUpdateInfo@1\n    targetPropertyName: _UpdateItems\n    appendToTargetPropertyName: true\n    rtId: 65dc6d24cc529cdc46c84fcc\n    ckTypeId: IndustryEnergy-1.0.0/EnergyMeter-1.0.0\n    attributeUpdates: \n      - attributeName: Voltage\n        attributeValueType: Double\n        valuePath: $.Sinus5\n    description: update\n  - type: ApplyChanges@1\n    targetPropertyName: _UpdateItems\n  - type: EnrichWithMongoDataNode@1\n    path: $._UpdateItems\n    targetPropertyName: _UpdateItems\n    appendToTargetPropertyName: true\n    rtId: 65dc6d24cc529cdc46c84fcc\n    ckTypeId: IndustryEnergy-1.0.0/EnergyMeter-1.0.0\n    attributeUpdates: \n      - attributeName: Power\n        attributeValueType: Double\n        valuePath: $.Power\n      - attributeName: Ampere\n        attributeValueType: Double\n        valuePath: $.Ampere\n    description: update\n  - type: SaveInTimeSeries@1\n"
    associations:
      - roleId: System/ParentChild
        targetRtId: 65d5c447b420da3fb12381bc
        targetCkTypeId: System.Communication/CommunicationAdapter        
