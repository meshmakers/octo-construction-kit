$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication
entities:
  - rtId: 65d5c447b420da3fb12381bb
    ckTypeId: System.Communication/CommunicationPool
    attributes:
      - id: System/Name
        value: simulation
    associations: []
  - rtId: 65d5c447b420da3fb12381bc
    ckTypeId: System.Communication/CommunicationAdapter
    attributes:
      - id: System.Communication/AdapterType
        value: Meshmakers.Plugs.Simulator
      - id: System.Communication/AdapterConfiguration
        value: "{ \"interval\": \"00:00:10\" }"
      - id: System.Communication/Deployment.ImageName
        value: meshmakers/octo-communication-plug-simulation      
      - id: System.Communication/Deployment.ImageVersion
        value: "999.0.0.0"
    associations:
      - roleId: System/ParentChild
        targetRtId: 65d5c447b420da3fb12381bb
        targetCkTypeId: System.Communication/CommunicationPool
        
    # Data pipelines of plug
  - rtId: 65d5c447b420da3fb12381bd
    ckTypeId: System.Communication/DataPipeline
    attributes:
      - id: System/Name
        value: Simulation Pipeline
      - id: System.Communication/AdapterPipelineConfiguration
        value: "transformations:\n- type: Simulation@1\n  simulations:\n  - propertyName: Sinus\n  - propertyName: Constant_6\n    simulationTypes: 2\n    parameter1: 6\n  - propertyName: Triangle\n    simulationTypes: 1\n  description: Simulates data\n- type: SelectByPath@1\n  transformations:\n  - sourcePath: \"$.Sinus\"\n    targetPropertyName: Sinus5\n    transformations:\n    - type: LinearScaler@1\n      scaleInputMin: 0\n      scaleInputMax: 1\n      scaleOutputMin: 0\n      scaleOutputMax: 1000\n  - sourcePath: \"$.Constant_6\"\n    targetPropertyName: Constant\n    transformations:\n    - type: LinearScaler@1\n      scaleInputMin: 0\n      scaleInputMax: 10\n      scaleOutputMin: 0\n      scaleOutputMax: 1000\n  description: Transform object node\n- type: Project@1\n  fields:\n  - path: \"$.Sinus\"\n  - path: \"$.Constant_6\"\n- type: PublishToDistributionEventHub@1\n  description: Load to event hub\n"
    associations:
      - roleId: System/ParentChild
        targetRtId: 65d5c447b420da3fb12381bc
        targetCkTypeId: System.Communication/CommunicationAdapter        
