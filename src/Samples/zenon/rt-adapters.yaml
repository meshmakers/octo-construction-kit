$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication
entities:
  - rtId: 65d5c447b420da3fb12381bc
    ckTypeId: System.Communication/EdgeAdapter
    attributes:
      - id: System/Name
        value: Zenon Sample PlugIn     
      - id: System.Communication/AdapterConfiguration
        value: "{\"variables\":[\"VAR1\",\"VAR2\",\"VAR3\"]}"
        
    # Data pipelines of plug
  - rtId: 65d5c447b420da3fb12381bd
    ckTypeId: System.Communication/DataPipeline
    attributes:
      - id: System/Name
        value: zenon Pipeline
  - rtId: 65d5c447b420da3fb12381bf
    ckTypeId: System.Communication/MeshPipeline
    attributes:
      - id: System.Communication/PipelineDefinition
        value: >-
          triggers:
            - type: FromPipelineDataEvent@1
              description: Retrieve from distributed event hub message
          transformations:
            - type: PrintDebug@1
    associations:
      - roleId: System/ParentChild
        targetRtId: 65d5c447b420da3fb12381bd
        targetCkTypeId: System.Communication/DataPipeline
  - rtId: 65d5c447b420da3fb12381be
    ckTypeId: System.Communication/EdgePipeline
    attributes:
      - id: System.Communication/PipelineDefinition
        value: >-
          transformations: 
            - type: ReadZenonVariables@1
              description: Read data from zenon 
            - type: PublishToDistributionEventHub@1
              description: Load to event hub
    associations:
      - roleId: System/ParentChild
        targetRtId: 65d5c447b420da3fb12381bd
        targetCkTypeId: System.Communication/DataPipeline